name: Sync develop (GitUCR) to main (GitHub)

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Sync repos
        run: |
          git clone --branch develop https://JORGE.QUIROSANDERSON:${{ secrets.GITUCR_TOKEN }}@git.ucr.ac.cr/project/saga_ucr.git repo
          cd repo

          git remote add github https://${{ secrets.GH_TOKEN }}@github.com/Joax48/Saga.git

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Traer main de GitHub
          git fetch github main

          # Crear rama main basada en develop
          git checkout -B main

          # Hacer merge con lo que ya existe en GitHub
          git merge github/main --allow-unrelated-histories -X theirs

          # Push normal
          git push github main
