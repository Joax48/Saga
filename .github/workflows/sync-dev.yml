name: Sync develop (GitUCR) to main (GitHub)

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Sync repos
        run: |
          git clone --branch develop https://JORGE.QUIROSANDERSON:${{ secrets.GITUCR_TOKEN }}@git.ucr.ac.cr/project/saga_ucr.git repo
          cd repo

          git remote add github https://${{ secrets.GH_TOKEN }}@github.com/Joax48/Saga.git

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Traer main de GitHub
          git fetch github main

          # Crear rama main basada en develop
          git checkout -B main

          # Intentar merge con lo que ya existe en GitHub,
          # priorizando la version actual (develop clonado) en conflictos.
          # Si quedan conflictos (ej: modify/delete), forzar resolucion con "ours".
          git merge github/main --allow-unrelated-histories -X ours || true
          if [ -n "$(git ls-files -u)" ]; then
            git checkout --ours .
            git add -A
            git commit -m "Resolve conflicts favoring GitUCR develop"
          fi

          # Push normal
          git push github main
