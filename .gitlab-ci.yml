stages:
  - install
  - quality
  - test
  - build

workflow:
  rules:
    - when: always
      allow_failure: true

variables:
  NODE_VERSION: "20"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"

default:
  image: node:${NODE_VERSION}-alpine
  interruptible: true

cache:
  key: "${CI_COMMIT_REF_SLUG}"
  policy: pull-push
  paths:
    - .npm/
    - node_modules/
    - apps/api/node_modules/
    - apps/web/node_modules/

install:
  stage: install
  when: manual
  script:
    - npm ci
  artifacts:
    expire_in: 1 day
    paths:
      - node_modules/
      - apps/api/node_modules/
      - apps/web/node_modules/

lint:
  stage: quality
  needs: [install]
  script:
    - npm run lint

typecheck:
  stage: quality
  needs: [install]
  script:
    - npm run typecheck

test:api:
  stage: test
  needs: [install]
  script:
    - npm run test:api
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'

test:web:
  stage: test
  needs: [install]
  script:
    - npm run test:web
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'

build:api:
  stage: build
  needs: [lint, typecheck, test:api, test:web]
  script:
    - npm run build:api
  artifacts:
    expire_in: 1 day
    paths:
      - apps/api/dist/

build:web:
  stage: build
  needs: [lint, typecheck, test:api, test:web]
  script:
    - npm run build:web
  artifacts:
    expire_in: 1 day
    paths:
      - apps/web/.next/
