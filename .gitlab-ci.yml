stages:
  - install
  - quality
  - test
  - build

workflow:
  rules:
    - when: always
      allow_failure: true

variables:
  NODE_VERSION: "20"
  PNPM_HOME: "$CI_PROJECT_DIR/.pnpm-store"

default:
  image: node:${NODE_VERSION}-alpine
  interruptible: true
  before_script:
    - npm install -g pnpm@11
    - pnpm config set store-dir $PNPM_HOME

cache:
  key: "${CI_COMMIT_REF_SLUG}"
  policy: pull-push
  paths:
    - .pnpm-store/
    - node_modules/

install:
  stage: install
  when: manual
  script:
    - pnpm install --frozen-lockfile
  artifacts:
    expire_in: 1 day
    paths:
      - node_modules/

lint:
  stage: quality
  needs: [install]
  script:
    - pnpm run lint

typecheck:
  stage: quality
  needs: [install]
  script:
    - pnpm run typecheck

test:api:
  stage: test
  needs: [install]
  script:
    - pnpm run test:api
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'

test:web:
  stage: test
  needs: [install]
  script:
    - pnpm run test:web
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'

build:api:
  stage: build
  needs: [lint, typecheck, test:api, test:web]
  script:
    - pnpm run build:api
  artifacts:
    expire_in: 1 day
    paths:
      - apps/api/dist/

build:web:
  stage: build
  needs: [lint, typecheck, test:api, test:web]
  script:
    - pnpm run build:web
  artifacts:
    expire_in: 1 day
    paths:
      - apps/web/.next/
